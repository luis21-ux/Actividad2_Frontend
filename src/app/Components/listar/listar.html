<div class="container py">
    <div class="card shadow-lg border-0 rounded-3">
        <div class="card-header text-center bg-light py-4">
            <h2 class="fw-bold text-secondary mb-0">LISTA DE VEHÍCULOS</h2>

            <div class=" d-flex justify-content-center my-4">
                <div class="input-group input-group-lg w-50 shadow-sm">
                    <span class="input-group-text bg-info text-white">
                        <i class="bi bi-search"></i>
                    </span>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="INGRESA LA PLACA DEL VEHICULO"
                        [(ngModel)]="filtro.placa"
                        (ngModelChange)="buscarPorPlaca($event)"
                        aria-label="Buscar por placa"
                    >
                </div>
            </div>
            <div class=" d-flex justify-content-center my-4">
                <div class="input-group input-group-lg w-50 shadow-sm">
                    <span class="input-group-text bg-info text-white">
                        <i class="bi bi-search"></i>
                    </span>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="INGRESA EL MODELO DEL VEHICULO"
                        [(ngModel)]="filtro.modelo"
                        (ngModelChange)="buscarPorModelo($event)"
                        aria-label="Buscar por modelo"
                    >
                </div>
            </div>
            <div class=" d-flex justify-content-center my-4">
                <div class="input-group input-group-lg w-50 shadow-sm">
                    <span class="input-group-text bg-info text-white">
                        <i class="bi bi-search"></i>
                    </span>
                    <input
                        type="text"
                        class="form-control"
                        placeholder="INGRESA EL AÑO DEL VEHICULO"
                        [(ngModel)]="filtro.anio"
                        (ngModelChange)="buscarPorAnio($event)"
                        aria-label="Buscar por año"
                    >
                </div>
            </div>
        </div>
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table table-striped table-hover align-midlde">
                    <thead class="table-info">
                        <tr class="text-center">
                            <th>PLACA</th>
                            <th>MARCA</th>
                            <th>MODELO</th>
                            <th>AÑO</th>
                            <th>COLOR</th>
                            <th>ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let vehiculo of vehiculosFiltrados; trackBy: trackByPlaca" class="text-center">
                            <td>{{vehiculo.placa}}</td>
                            <td>{{vehiculo.marca}}</td>
                            <td>{{vehiculo.modelo}}</td>
                            <td>{{vehiculo['año']}}</td>
                            <td>{{vehiculo.color}}</td>
                            <td>
                                <div class=" d-flex justify-content-center gap-3">
                                    <button type="button" class=" btn btn-lg btn-outline-warning shadow-sm"
                                        (click)="editar(vehiculo)">
                                        <i class="bi bi-pencil"></i>
                                    </button>
                                    <button type="button" class=" btn btn-lg btn-outline-danger shadow-sm"
                                        (click)="eliminar(vehiculo)">
                                        <i class="bi bi-trash"></i>
                                    </button>

                                </div>
                            </td>
                        </tr>
                        <tr *ngIf="vehiculosFiltrados.length === 0">
                            <td class="text-center text-muted py-4" colspan="6">NO SE ENCONTRARON VEHÍCULOS</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
